<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOE4视觉图片二次确认</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>MOE4视觉图片二次确认</h1>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <!-- 用户信息 -->
                <div class="user-section">
                    <h3>用户信息</h3>
                    <div class="user-info">
                        <label>IP地址：</label>
                        <span id="user-ip">加载中...</span>
                    </div>
                </div>

                <!-- 文件夹选择 -->
                <div class="folder-section">
                    <h3>目标文件夹</h3>
                    <select id="folder-select" class="folder-select">
                        <option value="">加载中...</option>
                    </select>
                </div>

                <!-- 图片信息 -->
                <div class="info-section">
                    <h3>图片信息</h3>
                    <div class="info-item">
                        <label>总数量：</label>
                        <span id="total-count">0</span>
                    </div>
                    <div class="info-item">
                        <label>当前：</label>
                        <span id="current-index">0</span>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <div class="info-item">
                        <label>修改时间：</label>
                        <span id="modify-time">-</span>
                    </div>
                    <div class="info-item">
                        <label>尺寸：</label>
                        <span id="image-size">-</span>
                    </div>
                </div>

                <!-- 显示选项 -->
                <div class="options-section">
                    <h3>显示选项</h3>
                    <div class="option-item">
                        <label class="switch-label">
                            <input type="checkbox" id="rotate-toggle">
                            <span>旋转90度 (R)</span>
                        </label>
                    </div>
                    <div class="option-item">
                        <label class="switch-label">
                            <input type="checkbox" id="bbox-toggle" checked>
                            <span>显示边界框 (B)</span>
                        </label>
                    </div>
                </div>

                <!-- 撤回操作 -->
                <div class="undo-section">
                    <h3>撤回操作</h3>
                    <button id="btn-undo" class="btn btn-undo" title="撤回操作 (U 或 Ctrl+Z)" disabled>撤回 (U)</button>
                    <div class="undo-info">
                        <span id="undo-count" class="undo-count"></span>
                    </div>
                </div>

                <!-- 导航链接 -->
                <div class="nav-section">
                    <a href="/history" class="nav-link">操作历史</a>
                    <a href="/review" class="nav-link">结果确认</a>
                </div>
            </aside>

            <!-- 图片显示区 -->
            <main class="image-area">
                <!-- 控制按钮 -->
                <div class="controls">
                    <button id="btn-first" class="btn" title="首张 (Home)">|&lt;</button>
                    <button id="btn-prev" class="btn" title="上一张 (← 或 A)">&lt;</button>
                    <button id="btn-ok" class="btn btn-ok" title="标记为OK (1 或 Enter)">OK</button>
                    <button id="btn-nok" class="btn btn-nok" title="标记为NOK (2 或 Space)">NOK</button>
                    <button id="btn-next" class="btn" title="下一张 (→ 或 D)">&gt;</button>
                    <button id="btn-last" class="btn" title="末张 (End)">&gt;|</button>
                </div>

                <!-- 图片显示容器 -->
                <div class="image-container">
                    <div id="image-name" class="image-name"></div>
                    <div id="loading" class="loading">加载中...</div>
                    <img id="main-image" class="main-image" alt="图片显示区域">
                    <div id="no-image" class="no-image">无图片</div>
                </div>

                <!-- 快捷键提示 -->
                <div class="shortcuts">
                    <h4>快捷键：</h4>
                    <span>←/A:上一张</span>
                    <span>→/D:下一张</span>
                    <span>1/Enter:OK</span>
                    <span>2/Space:NOK</span>
                    <span>U/Ctrl+Z:撤回</span>
                    <span>R:旋转</span>
                    <span>B:边界框</span>
                </div>
            </main>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>©2024 产线图片二次确认系统 WxP/MOE4</p>
        </footer>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="notification"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
