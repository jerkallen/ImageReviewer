<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WxP视觉图片二次确认</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="page-title"><span class="page-title-brand">UAES</span>无锡厂视觉图片二次确认</h1>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="user-section">
                    <h3>用户信息</h3>
                    <div class="user-info">
                        <label>IP地址：</label>
                        <span id="user-ip">加载中...</span>
                    </div>
                </div>

                <div class="folder-section">
                    <h3>目标文件夹</h3>
                    <select id="folder-select" class="folder-select">
                        <option value="">加载中...</option>
                    </select>
                </div>

                <div class="info-section">
                    <h3>图片信息</h3>
                    <div class="info-item">
                        <label>总数量：</label>
                        <span id="total-count">0</span>
                    </div>
                    <div class="info-item">
                        <label>当前：</label>
                        <span id="current-index">0</span>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <div class="info-item">
                        <label>修改时间：</label>
                        <span id="modify-time">-</span>
                    </div>
                    <div class="info-item">
                        <label>尺寸：</label>
                        <span id="image-size">-</span>
                    </div>
                </div>

                <div class="options-section">
                    <h3>显示选项</h3>
                    <div class="option-item">
                        <label class="switch-label">
                            <input type="checkbox" id="rotate-toggle">
                            <span>旋转90度 (R)</span>
                        </label>
                    </div>
                    <div class="option-item">
                        <label class="switch-label">
                            <input type="checkbox" id="bbox-toggle" checked>
                            <span>显示边界框 (B)</span>
                        </label>
                    </div>
                    <div id="image-fit-mode-controls" class="display-mode-bar" role="group" aria-label="主图显示模式">
                        <span class="display-mode-label">显示模式</span>
                        <div class="display-mode-toggle">
                            <button id="image-fit-fit-window" type="button" class="display-mode-btn is-active" data-image-fit-mode="fit-window" aria-pressed="true">适应窗口</button>
                            <button id="image-fit-prioritize-height" type="button" class="display-mode-btn" data-image-fit-mode="prioritize-height" aria-pressed="false">优先填高</button>
                        </div>
                    </div>
                </div>

                <div class="undo-section">
                    <h3>撤回操作</h3>
                    <button id="btn-undo" class="btn btn-undo" title="撤回操作 (U 或 Ctrl+Z)" disabled>撤回 (U)</button>
                    <div class="undo-info">
                        <span id="undo-count" class="undo-count"></span>
                    </div>
                </div>

                <div class="nav-section">
                    <a href="/history" class="nav-link">操作历史</a>
                    <a href="/review" class="nav-link">结果确认</a>
                    <a href="/settings" class="nav-link">设置</a>
                </div>
            </aside>

            <main class="image-area" data-image-fit-mode="fit-window">
                <div class="controls">
                    <button id="btn-first" class="btn" title="首张 (Home)">|&lt;</button>
                    <button id="btn-prev" class="btn" title="上一张 (← 或 A)">&lt;</button>
                    <button id="btn-ok" class="btn btn-ok" title="标记为 OK (1 或 Enter)">OK</button>
                    <button id="btn-nok" class="btn btn-nok" title="标记为 NOK (2 或 Space)">NOK</button>
                    <button id="btn-next" class="btn" title="下一张 (→ 或 D)">&gt;</button>
                    <button id="btn-last" class="btn" title="末张 (End)">&gt;|</button>
                </div>

                <div class="image-container">
                    <div id="image-name" class="image-name"></div>
                    <div id="loading" class="loading">加载中...</div>
                    <img id="main-image" class="main-image" alt="图片显示区域">
                    <div id="no-image" class="no-image">无图片</div>
                </div>

                <div class="shortcuts">
                    <h4>快捷键：</h4>
                    <span>←/A:上一张</span>
                    <span>→/D:下一张</span>
                    <span>1/Enter:OK</span>
                    <span>2/Space:NOK</span>
                    <span>U/Ctrl+Z:撤回</span>
                    <span>R:旋转</span>
                    <span>B:边界框</span>
                </div>
            </main>
        </div>

        <footer class="footer">
            <p>UAES无锡厂AI视觉端到端解决方案 - 视觉图片二次确认 v2.5</p>
        </footer>
    </div>

    <div id="notification" class="notification"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
