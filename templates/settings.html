<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 图片审查系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .settings-header h2 {
            color: #FFFFFF;
            font-size: 1.8rem;
        }

        body.theme-light .settings-header h2 {
            color: #333333;
        }

        .back-link {
            padding: 0.6rem 1.2rem;
            background: #0A2472;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.02rem;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: #1B3A6B;
        }

        body.theme-light .back-link {
            background: #e0e0e0;
            color: #333333;
        }

        body.theme-light .back-link:hover {
            background: #d0d0d0;
        }

        .settings-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        body.theme-light .settings-section {
            background: rgba(255, 255, 255, 0.8);
        }

        .settings-section h3 {
            color: #FFFFFF;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #444444;
            padding-bottom: 0.5rem;
        }

        body.theme-light .settings-section h3 {
            color: #333333;
            border-bottom-color: #d0d0d0;
        }

        .setting-item {
            margin-bottom: 1.5rem;
        }

        .setting-item label {
            display: block;
            color: #E8E8E8;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        body.theme-light .setting-item label {
            color: #333333;
        }

        .setting-description {
            color: #B0B0B0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        body.theme-light .setting-description {
            color: #666666;
        }

        .setting-item input[type="text"] {
            width: 100%;
            padding: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444444;
            border-radius: 4px;
            color: #FFFFFF;
            font-size: 1rem;
        }

        body.theme-light .setting-item input[type="text"] {
            background: rgba(255, 255, 255, 0.9);
            border-color: #d0d0d0;
            color: #333333;
        }

        .setting-item input[type="text"]:focus {
            outline: none;
            border-color: #0A2472;
        }

        body.theme-light .setting-item input[type="text"]:focus {
            border-color: #0A2472;
        }

        .switch-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555555;
            transition: 0.4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #28A745;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .switch-label {
            color: #E8E8E8;
            font-size: 1rem;
        }

        body.theme-light .switch-label {
            color: #333333;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-save, .btn-reset, .btn-test {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 6px;
            font-size: 1.08rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-save {
            background: #28A745;
            color: #FFFFFF;
        }

        .btn-save:hover {
            background: #218838;
        }

        .btn-reset {
            background: #6C757D;
            color: #FFFFFF;
        }

        .btn-reset:hover {
            background: #5A6268;
        }

        .btn-test {
            background: #007BFF;
            color: #FFFFFF;
        }

        .btn-test:hover {
            background: #0056B3;
        }

        .btn-test:disabled {
            background: #6C757D;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-message {
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            display: none;
        }

        .status-message.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28A745;
            color: #28A745;
        }

        .status-message.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #DC3545;
            color: #DC3545;
        }

        .status-message.show {
            display: block;
        }

        /* Theme overrides */
        body,
        button,
        input,
        select,
        textarea {
            font-family: 'Bahnschrift', 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .settings-header h2,
        .settings-section h3,
        .setting-item label,
        .switch-label {
            color: var(--theme-text);
        }

        .back-link {
            background: var(--theme-accent);
            color: #f4f7fa;
        }

        .back-link:hover {
            background: var(--theme-accent-strong);
        }

        .settings-section {
            background: var(--theme-panel-strong);
        }

        .settings-section h3 {
            border-bottom-color: var(--theme-border);
        }

        .setting-description {
            color: var(--theme-muted);
        }

        .setting-item input[type="text"] {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--theme-border);
            color: var(--theme-text);
        }

        .setting-item input[type="text"]:focus {
            border-color: var(--theme-accent);
        }

        .slider {
            background-color: rgba(255, 255, 255, 0.18);
        }

        input:checked + .slider,
        .btn-save {
            background-color: var(--theme-ok);
            background: var(--theme-ok);
        }

        .btn-save:hover {
            background: var(--theme-ok-hover);
        }

        .btn-reset {
            background: var(--theme-accent);
            color: #f4f7fa;
        }

        .btn-reset:hover {
            background: var(--theme-accent-strong);
        }

        .btn-test {
            background: var(--theme-info);
            color: #fffaf7;
        }

        .btn-test:hover {
            background: #627989;
        }

        .btn-test:disabled {
            background: rgba(114, 136, 151, 0.55);
        }

        .status-message.success {
            background: rgba(92, 159, 107, 0.18);
            border-color: var(--theme-ok);
            color: var(--theme-ok);
        }

        .status-message.error {
            background: rgba(200, 100, 72, 0.18);
            border-color: var(--theme-nok);
            color: var(--theme-nok);
        }

        body.theme-light .settings-header h2,
        body.theme-light .settings-section h3,
        body.theme-light .setting-item label,
        body.theme-light .switch-label {
            color: var(--theme-text);
        }

        body.theme-light .back-link {
            background: var(--theme-accent);
            color: #f4f7fa;
        }

        body.theme-light .back-link:hover {
            background: var(--theme-accent-strong);
        }

        body.theme-light .settings-section {
            background: var(--theme-panel);
        }

        body.theme-light .settings-section h3 {
            border-bottom-color: var(--theme-border);
        }

        body.theme-light .setting-description {
            color: var(--theme-muted);
        }

        body.theme-light .setting-item input[type="text"] {
            background: rgba(255, 255, 255, 0.94);
            border-color: var(--theme-border);
            color: var(--theme-text);
        }

        body.theme-light .setting-item input[type="text"]:focus {
            border-color: var(--theme-accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>系统设置</h1>
        </header>

        <div class="settings-container">
            <div class="settings-header">
                <h2>应用设置</h2>
                <a href="/" class="back-link">返回主页</a>
            </div>

            <!-- 飞书设置 -->
            <div class="settings-section">
                <h3>飞书消息设置</h3>
                
                <div class="setting-item">
                    <label>NOK图片飞书发送</label>
                    <div class="setting-description">
                        开启后，当确认图片为NOK时，会询问是否将图片发送到飞书群
                    </div>
                    <div class="switch-container">
                        <label class="switch">
                            <input type="checkbox" id="feishu-enabled">
                            <span class="slider"></span>
                        </label>
                        <span class="switch-label" id="switch-status">关闭</span>
                    </div>
                </div>

                <div class="setting-item">
                    <label for="feishu-chat-id">飞书群ID</label>
                    <div class="setting-description">
                        请输入飞书群的chat_id（格式如: oc_xxxxx）
                    </div>
                    <input type="text" id="feishu-chat-id" placeholder="例如: oc_18623c08a21247f0770ede48ec7f972f">
                </div>

                <div class="setting-item">
                    <button class="btn-test" id="btn-test-feishu">测试飞书连接</button>
                    <div class="setting-description" style="margin-top: 0.5rem;">
                        点击按钮测试当前飞书群ID是否可以正常发送消息
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-save" id="btn-save">保存设置</button>
                    <button class="btn-reset" id="btn-reset">重置</button>
                </div>

                <div id="status-message" class="status-message"></div>
                <div id="test-message" class="status-message"></div>
            </div>
        </div>

        <footer class="footer">
            <p>WxP/MOE4 产线图片二次确认系统 v2.0</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
