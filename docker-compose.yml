# 容器化部署配置
# 兼容性: Podman Desktop / Docker (完全兼容 OCI 标准)
# 自动重启: 已启用，系统重启后自动恢复服务
# 运行环境: Windows 11 + WSL2 / Linux

services:
  image-reviewer:
    container_name: image_reviewer
    image: image_reviewer:latest
    build: .  # 构建上下文目录
    ports:
      - "8501:8501"  # HTTPS/HTTP 端口映射（兼容 Windows 和 WSL2）
    volumes:
      - ./certs:/app/certs  # SSL 证书目录（持久化）
      - ./data:/data  # 数据目录（图片、日志、数据库）
    environment:
      - TZ=Asia/Shanghai  # 时区设置
      - ROOT_DIRECTORY=/data  # 应用数据根目录
    restart: always  # 自动重启策略：总是重启（Podman/Docker 通用）
    networks:
      - image-reviewer-network

networks:
  image-reviewer-network:
    driver: bridge  # 桥接网络（Podman/Docker 通用）

